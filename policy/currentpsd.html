  'People receive simple, fast, inclusive, and secure programs and services that meet their needs;',
  'The federal digital workforce has the capacity, multidisciplinary skills, and clear accountability and feedback loops to steward and continuously improve services and enabling technology.',
  'Canada benefits from digital public infrastructure that is secure, resilient, interoperable, protects sovereignty, and enables innovation; and',
  'Departments can use reliable, stable, interoperable platforms, internal services, and data;'
];

var krLabels = {
  'People receive simple, fast, inclusive, and secure programs and services that meet their needs;': 'People receive simple, fast, inclusive, and secure programs and services that meet their needs',
  'The federal digital workforce has the capacity, multidisciplinary skills, and clear accountability and feedback loops to steward and continuously improve services and enabling technology.': 'The federal digital workforce has the capacity, multidisciplinary skills, and clear accountability and feedback loops to steward and continuously improve services and enabling technology',

  'Departments can use reliable, stable, interoperable platforms, internal services, and data;': 'Departments can use reliable, stable, interoperable platforms, internal services, and data'
};

function buildCards(container, allCards) {
  var grouped = {};
  requirements.forEach(function(r) {
    var k = r.role || 'Other';
    if (!grouped[k]) grouped[k] = [];
    grouped[k].push(r);
  });

  var roleOrder = Object.keys(grouped).sort();

  roleOrder.forEach(function(role) {
    if (!grouped[role]) return;
    var section = document.createElement('div');
    section.className = 'kr-section';
    section.dataset.role = role;

    var label = document.createElement('p');
    label.className = 'kr-label';
    label.textContent = role;
    section.appendChild(label);

    var grid = document.createElement('div');
    grid.className = 'req-grid';

    grouped[role].forEach(function(r) {
      var card = document.createElement('div');
      card.className = 'req-card';
      card.dataset.role = r.role;
      card.dataset.topic = r.topic;
      card.dataset.principle = r.principle;
      card.dataset.kr = r.kr;
      card.innerHTML =
        '<span class="card-clause">Clause\u00a0' + r.clause + '</span>' +
        '<p class="card-req">' + r.req + '</p>' +
        '<span class="card-role">' + r.role + '</span>';
      grid.appendChild(card);
      if (allCards) allCards.push({ card: card, section: section });
    });

    section.appendChild(grid);
    container.appendChild(section);
  });
}

var allCards = [];

document.addEventListener('DOMContentLoaded', function() {
  buildCards(document.getElementById('content'), allCards);

  function populateSelect(id, field) {
    var sel = document.getElementById(id);
    var vals = Array.from(new Set(requirements.map(function(r) { return r[field]; }).filter(Boolean))).sort();
    vals.forEach(function(v) {
      var o = document.createElement('option');
      o.value = v;
      o.textContent = (field === 'kr' && krLabels[v]) ? krLabels[v] : v;
      sel.appendChild(o);
    });
    if (vals.length === 0) {
      sel.disabled = true;
      sel.style.opacity = '0.5';
      sel.style.cursor = 'not-allowed';
    }
  }
  populateSelect('f-role', 'role');
  populateSelect('f-topic', 'topic');
  populateSelect('f-kr', 'kr');

  function applyFilters() {
    var fRole = document.getElementById('f-role').value;
    var fTopic = document.getElementById('f-topic').value;
      var fKr = document.getElementById('f-kr').value;
    var visible = 0;

    allCards.forEach(function(item) {
      var c = item.card;
      var show = (!fRole || c.dataset.role === fRole) &&
                 (!fTopic || c.dataset.topic === fTopic) &&
                   (!fKr || c.dataset.kr === fKr);
      c.classList.toggle('hidden', !show);
      if (show) visible++;
    });

    document.querySelectorAll('.kr-section').forEach(function(sec) {
      var any = sec.querySelectorAll('.req-card:not(.hidden)').length > 0;
      sec.classList.toggle('hidden', !any);
    });

    document.getElementById('result-count').textContent = visible + ' of ' + requirements.length + ' requirements';
    document.getElementById('no-results').style.display = visible === 0 ? 'block' : 'none';
  }

  function clearFilters() {
    ['f-role', 'f-topic', 'f-kr'].forEach(function(id) {
      var el = document.getElementById(id);
      if (!el.disabled) el.value = '';
    });
    applyFilters();
  }

  ['f-role', 'f-topic', 'f-kr'].forEach(function(id) {
  document.getElementById('btn-clear').addEventListener('click', clearFilters);
  document.getElementById('no-results-clear').addEventListener('click', clearFilters);

  applyFilters();
});

</script>
