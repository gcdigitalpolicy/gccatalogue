.hero-links a { font-size: 0.9rem; font-weight: 600; color: #1a4b7a; text-decoration: none; }
.hero-links a:hover { text-decoration: underline; }
.hero img { width: 180px; flex-shrink: 0; opacity: 0.85; }

/* HERO (filter page variant) */
.hero-simple { background: #f5f5f5; border-bottom: 1px solid #ddd; padding: 40px 32px; }
.hero-simple .inner { max-width: 1100px; margin: 0 auto; }
.hero-simple h1 { font-size: 1.9rem; font-weight: 700; color: #26374a; margin-bottom: 12px; }
.hero-simple p { font-size: 1rem; color: #555; max-width: 700px; }
.hero-simple p a { color: #1a4b7a; }

.filter-bar { background: #26374a; padding: 28px 32px; }
.filter-bar .inner { max-width: 1100px; margin: 0 auto; }
.filter-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.filter-group label { display: block; font-size: 0.75rem; font-weight: 700; color: #bbb; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 7px; }

.filter-footer { margin-top: 18px; display: flex; align-items: center; gap: 20px; }
.btn-clear { background: transparent; border: 1px solid rgba(255,255,255,.4); color: #fff; padding: 7px 16px; border-radius: 4px; font-size: 0.85rem; cursor: pointer; font-family: inherit; }

main { max-width: 1100px; margin: 0 auto; padding: 48px 32px; min-height: 300px; }
.page-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 36px; flex-wrap: wrap; gap: 12px; }

.btn { display: inline-block; padding: 9px 18px; border-radius: 4px; font-size: 0.88rem; font-weight: 600; text-decoration: none; }
.btn-primary { background: #26374a; color: #fff; }

.kr-section.hidden { display: none; }
.kr-label { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #666; padding-bottom: 10px; border-bottom: 2px solid #e0e0e0; margin-bottom: 20px; }
.req-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px; }
.req-card { border: 1px solid #e0e0e0; border-radius: 6px; padding: 20px; background: #fff; display: flex; flex-direction: column; gap: 12px; transition: box-shadow .15s; }

.req-card.hidden { display: none; }
.card-clause { font-size: 0.78rem; font-weight: 700; color: #fff; background: #1a4b7a; padding: 2px 9px; border-radius: 4px; display: inline-block; align-self: flex-start; }

.card-role { font-size: 0.78rem; color: #555; background: #eef2f7; padding: 3px 10px; border-radius: 20px; display: inline-block; align-self: flex-start; }

/* NO RESULTS */
.no-results { display: none; text-align: center; padding: 80px 24px; color: #666; }
.no-results p { font-size: 1.05rem; margin-bottom: 16px; }
.no-results button { background: none; border: none; color: #1a4b7a; text-decoration: underline; cursor: pointer; font-size: 1rem; font-family: inherit; }

.help-band { background: #f5f5f5; border-top: 1px solid #ddd; padding: 48px 32px; margin-top: 16px; }

.help-band p { color: #555; font-size: 0.95rem; }
.help-band p a { color: #1a4b7a; }
.help-band img { width: 140px; flex-shrink: 0; }

/* FOOTER */
footer { background: #26374a; padding: 22px 32px; }
footer .inner { max-width: 1100px; margin: 0 auto; display: flex; justify-content: flex-end; }
footer img { height: 24px; filter: brightness(0) invert(1); }

@media (max-width: 800px) { .filter-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 680px) {
  .hero .inner, .help-band .inner { flex-direction: column; }

  .page-meta { flex-direction: column; align-items: flex-start; }

@media (max-width: 500px) { .filter-grid { grid-template-columns: 1fr; } }

var krOrder = [
  'People receive simple, fast, inclusive, and secure programs and services that meet their needs;',
  'The federal digital workforce has the capacity, multidisciplinary skills, and clear accountability and feedback loops to steward and continuously improve services and enabling technology.',
  'Canada benefits from digital public infrastructure that is secure, resilient, interoperable, protects sovereignty, and enables innovation; and',
  'Departments can use reliable, stable, interoperable platforms, internal services, and data;'
];

var krLabels = {
  'People receive simple, fast, inclusive, and secure programs and services that meet their needs;': 'People receive simple, fast, inclusive, and secure programs and services that meet their needs',
  'The federal digital workforce has the capacity, multidisciplinary skills, and clear accountability and feedback loops to steward and continuously improve services and enabling technology.': 'The federal digital workforce has the capacity, multidisciplinary skills, and clear accountability and feedback loops to steward and continuously improve services and enabling technology',
  'Canada benefits from digital public infrastructure that is secure, resilient, interoperable, protects sovereignty, and enables innovation; and': 'Canada benefits from digital public infrastructure that is secure, resilient, interoperable, protects sovereignty, and enables innovation',
  'Departments can use reliable, stable, interoperable platforms, internal services, and data;': 'Departments can use reliable, stable, interoperable platforms, internal services, and data'
};

function buildCards(container, allCards) {
  var grouped = {};
  requirements.forEach(function(r) {
    var k = r.role || 'Other';
    if (!grouped[k]) grouped[k] = [];
    grouped[k].push(r);
  });

  var roleOrder = Object.keys(grouped).sort();

  roleOrder.forEach(function(role) {
    if (!grouped[role]) return;
    var section = document.createElement('div');
    section.className = 'kr-section';
    section.dataset.role = role;

    var label = document.createElement('p');
    label.className = 'kr-label';
    label.textContent = role;
    section.appendChild(label);

    var grid = document.createElement('div');
    grid.className = 'req-grid';

    grouped[role].forEach(function(r) {
      var card = document.createElement('div');
      card.className = 'req-card';
      card.dataset.role = r.role;
      card.dataset.topic = r.topic;
      card.dataset.principle = r.principle;
      card.dataset.kr = r.kr;
      card.innerHTML =
        '<span class="card-clause">Clause\u00a0' + r.clause + '</span>' +
        '<p class="card-req">' + r.req + '</p>' +
        '<span class="card-role">' + r.role + '</span>';
      grid.appendChild(card);
      if (allCards) allCards.push({ card: card, section: section });
    });

    section.appendChild(grid);
    container.appendChild(section);
  });
}

var allCards = [];

document.addEventListener('DOMContentLoaded', function() {
  buildCards(document.getElementById('content'), allCards);

  function populateSelect(id, field) {
    var sel = document.getElementById(id);
    var vals = Array.from(new Set(requirements.map(function(r) { return r[field]; }).filter(Boolean))).sort();
    vals.forEach(function(v) {
      var o = document.createElement('option');
      o.value = v;
      o.textContent = (field === 'kr' && krLabels[v]) ? krLabels[v] : v;
      sel.appendChild(o);
    });
    if (vals.length === 0) {
      sel.disabled = true;
      sel.style.opacity = '0.5';
      sel.style.cursor = 'not-allowed';
    }
  }
  populateSelect('f-role', 'role');
  populateSelect('f-topic', 'topic');
  populateSelect('f-principle', 'principle');
  populateSelect('f-kr', 'kr');

  function applyFilters() {
    var fRole = document.getElementById('f-role').value;
    var fTopic = document.getElementById('f-topic').value;
    var fPrinciple = document.getElementById('f-principle').value;
    var fKr = document.getElementById('f-kr').value;
    var visible = 0;

    allCards.forEach(function(item) {
      var c = item.card;
      var show = (!fRole || c.dataset.role === fRole) &&
                 (!fTopic || c.dataset.topic === fTopic) &&
                 (!fPrinciple || c.dataset.principle === fPrinciple) &&
                 (!fKr || c.dataset.kr === fKr);
      c.classList.toggle('hidden', !show);
      if (show) visible++;
    });

    document.querySelectorAll('.kr-section').forEach(function(sec) {
      var any = sec.querySelectorAll('.req-card:not(.hidden)').length > 0;
      sec.classList.toggle('hidden', !any);
    });

    document.getElementById('result-count').textContent = visible + ' of ' + requirements.length + ' requirements';
    document.getElementById('no-results').style.display = visible === 0 ? 'block' : 'none';
  }

  function clearFilters() {
    ['f-role', 'f-topic', 'f-principle', 'f-kr'].forEach(function(id) {
      var el = document.getElementById(id);
      if (!el.disabled) el.value = '';
    });
    applyFilters();
  }

  ['f-role', 'f-topic', 'f-principle', 'f-kr'].forEach(function(id) {
    document.getElementById(id).addEventListener('change', applyFilters);
  });
  document.getElementById('btn-clear').addEventListener('click', clearFilters);
  document.getElementById('no-results-clear').addEventListener('click', clearFilters);

  applyFilters();
});

</script>
