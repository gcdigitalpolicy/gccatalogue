// Populate dropdowns
function populateSelect(id,field){
  var sel=document.getElementById(id);
  var vals=[...new Set(requirements.map(r=>r[field]))].sort();
  vals.forEach(function(v){var o=document.createElement("option");o.value=v;o.textContent=v;sel.appendChild(o);});
}
populateSelect("f-source","src");
populateSelect("f-role","role");
populateSelect("f-topic","topic");
populateSelect("f-principle","principle");
populateSelect("f-kr","kr");

// Build cards
var container=document.getElementById("req-cards");
requirements.forEach(function(r){
  var d=document.createElement("div");
  d.className="req-card src-"+r.src.toLowerCase();
  d.dataset.source=r.src;
  d.dataset.role=r.role;
  d.dataset.topic=r.topic;
  d.dataset.principle=r.principle;
  d.dataset.kr=r.kr;
  d.dataset.text=r.req.toLowerCase();
  d.innerHTML=
    '<p class="card-ref"><code>'+r.id+'</code> — <span class="label" style="background:'+(r.src==="PSD"?"#1d4e89":"#af3c43")+';color:#fff">'+r.src+'</span> Section '+r.sec+'</p>'+
    '<p class="card-req">'+r.req+'</p>'+
    '<div>'+
    '<span class="tag tag-role">'+r.role+'</span>'+
    '<span class="tag tag-topic">'+r.topic+'</span>'+
    '<span class="tag tag-principle">'+r.principle+'</span>'+
    '<span class="tag tag-kr">'+r.kr+'</span>'+
    '</div>';
  container.appendChild(d);
});

function applyFilters(){
  var fSrc=document.getElementById("f-source").value;
  var fRole=document.getElementById("f-role").value;
  var fTopic=document.getElementById("f-topic").value;
  var fPrinciple=document.getElementById("f-principle").value;
  var fKr=document.getElementById("f-kr").value;
  var fSearch=document.getElementById("f-search").value.toLowerCase().trim();
  var cards=document.querySelectorAll(".req-card");
  var visible=0;
  cards.forEach(function(c){
    var show=(!fSrc||c.dataset.source===fSrc)&&
             (!fRole||c.dataset.role===fRole)&&
             (!fTopic||c.dataset.topic===fTopic)&&
             (!fPrinciple||c.dataset.principle===fPrinciple)&&
             (!fKr||c.dataset.kr===fKr)&&
             (!fSearch||c.dataset.text.includes(fSearch));
    c.style.display=show?"":"none";
    if(show)visible++;
  });
  var total=requirements.length;
  document.getElementById("result-count").textContent=
    "Showing "+visible+" of "+total+" requirements";
}

["f-source","f-role","f-topic","f-principle","f-kr"].forEach(function(id){
  document.getElementById(id).addEventListener("change",applyFilters);
});
document.getElementById("f-search").addEventListener("input",applyFilters);
document.getElementById("btn-clear").addEventListener("click",function(){
  ["f-source","f-role","f-topic","f-principle","f-kr"].forEach(function(id){document.getElementById(id).value="";});
  document.getElementById("f-search").value="";
  applyFilters();
});

applyFilters();
</script>
