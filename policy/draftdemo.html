<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Policy and Directive on Service and Digital — Requirements</title>
<link rel="stylesheet" href="styles.css">
<style>
  .filter-grid { grid-template-columns: repeat(5, 1fr); }
  @media (max-width: 900px) { .filter-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 600px) { .filter-grid { grid-template-columns: repeat(2, 1fr); } }
  .card-instrument { font-size: 0.72rem; font-weight: 700; color: #fff; padding: 2px 8px; border-radius: 4px; display: inline-block; align-self: flex-start; }
  .card-instrument.psd { background: #1a4b7a; }
  .card-instrument.dsd { background: #284162; }
</style>
</head>
<body>

<header class="site-header">
  <div class="inner">
    <a href="#" class="brand">
      <img src="https://www.canada.ca/etc/designs/canada/wet-boew/assets/sig-blk-en.svg" alt="Government of Canada / Gouvernement du Canada">
      <div class="divider"></div>
      <span class="site-title">PSD &amp; DSD Requirements <span class="badge">Alpha</span></span>
    </a>
    <a href="#" class="lang-link">Français</a>
  </div>
</header>

<div class="hero-simple">
  <div class="inner">
    <h1>Policy and Directive on Service and Digital — Requirements</h1>
    <p>Find requirements from the <a href="https://www.tbs-sct.canada.ca/pol/doc-eng.aspx?id=32603">Policy on Service and Digital</a> and the <a href="https://www.tbs-sct.canada.ca/pol/doc-eng.aspx?id=32601">Directive on Service and Digital</a> by instrument, role, topic, principle, or key result.</p>
  </div>
</div>

<div class="filter-bar">
  <div class="inner">
    <div class="filter-grid">
      <div class="filter-group">
        <label for="f-instrument">Instrument</label>
        <select id="f-instrument"><option value="">Policy and Directive</option></select>
      </div>
      <div class="filter-group">
        <label for="f-role">Role</label>
        <select id="f-role"><option value="">All roles</option></select>
      </div>
      <div class="filter-group">
        <label for="f-topic">Topic</label>
        <select id="f-topic"><option value="">All topics</option></select>
      </div>
      <div class="filter-group">
        <label for="f-principle">Principle</label>
        <select id="f-principle"><option value="">All principles</option></select>
      </div>
      <div class="filter-group">
        <label for="f-kr">Key Result</label>
        <select id="f-kr"><option value="">All key results</option></select>
      </div>
    </div>
    <div class="filter-footer">
      <button class="btn-clear" id="btn-clear" type="button">Clear filters</button>
      <span class="result-count" id="result-count"></span>
    </div>
  </div>
</div>

<main id="main-content">
  <div id="content"></div>
  <div class="no-results" id="no-results">
    <p>No requirements match your filters.</p>
    <button id="no-results-clear">Clear all filters</button>
  </div>
</main>

<footer>
  <div class="inner">
    <img src="https://www.canada.ca/etc/designs/canada/wet-boew/assets/wmms-blk.svg" alt="Symbol of the Government of Canada">
  </div>
</footer>

<script src="combined-requirements.js"></script>
<script src="combined-filter.js"></script>
</body>
</html>
