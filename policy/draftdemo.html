.hero p { font-size: 1rem; color: #555; max-width: 700px; }

/* FILTER BAR */
.filter-bar { background: #26374a; padding: 28px 32px; }
.filter-bar .inner { max-width: 1100px; margin: 0 auto; }
.filter-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.filter-group label { display: block; font-size: 0.75rem; font-weight: 700; color: #bbb; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 7px; }

.filter-group select:focus { outline: 2px solid #fff; outline-offset: 2px; }
.filter-footer { margin-top: 18px; display: flex; align-items: center; gap: 20px; }
.btn-clear { background: transparent; border: 1px solid rgba(255,255,255,.4); color: #fff; padding: 7px 16px; border-radius: 4px; font-size: 0.85rem; cursor: pointer; font-family: inherit; }

.result-count { color: rgba(255,255,255,.75); font-size: 0.88rem; }

.req-card { border: 1px solid #e0e0e0; border-radius: 6px; padding: 20px; background: #fff; display: flex; flex-direction: column; gap: 12px; transition: box-shadow .15s; }
.req-card:hover { box-shadow: 0 2px 10px rgba(0,0,0,.09); }
.req-card.hidden { display: none; }
.card-clause { font-size: 0.78rem; font-weight: 700; color: #fff; background: #1a4b7a; padding: 2px 9px; border-radius: 4px; display: inline-block; }
.card-req { font-size: 0.92rem; line-height: 1.6; color: #222; flex: 1; }
.card-role { font-size: 0.78rem; color: #555; background: #eef2f7; padding: 3px 10px; border-radius: 20px; display: inline-block; }

/* NO RESULTS */

.no-results p { font-size: 1.05rem; margin-bottom: 16px; }
.no-results button { background: none; border: none; color: #1a4b7a; text-decoration: underline; cursor: pointer; font-size: 1rem; font-family: inherit; }

/* FOOTER */
footer { background: #26374a; padding: 22px 32px; margin-top: 40px; }
footer .inner { max-width: 1100px; margin: 0 auto; display: flex; justify-content: flex-end; }
footer img { height: 24px; filter: brightness(0) invert(1); }

@media (max-width: 800px) {

@media (max-width: 500px) {

function populateSelect(id, field) {
  var sel = document.getElementById(id);
  var vals = [...new Set(requirements.map(r => r[field]).filter(Boolean))].sort();
  vals.forEach(function(v) {
    var o = document.createElement('option');
    // Use short label for kr dropdown
    o.value = v;
    o.textContent = (field === 'kr' && krShort[v]) ? krShort[v] : v;
    sel.appendChild(o);
  });
  // Disable if no options
  if (vals.length === 0) {
    sel.disabled = true;
    sel.style.opacity = '0.5';
    sel.style.cursor = 'not-allowed';
  }
}

  label.className = 'kr-label';
  label.textContent = krShort[kr] || kr;
  section.appendChild(label);

  var grid = document.createElement('div');
  grid.className = 'req-grid';

  grouped[kr].forEach(function(r) {
    var card = document.createElement('div');
    card.className = 'req-card';
    card.dataset.role = r.role;
    card.dataset.topic = r.topic;
    card.dataset.principle = r.principle;
    card.dataset.kr = r.kr;
    card.innerHTML =
      '<span class="card-clause">Clause ' + r.clause + '</span>' +
      '<p class="card-req">' + r.req + '</p>' +
      '<span class="card-role">' + r.role + '</span>';
    grid.appendChild(card);
    allCards.push({ card: card, section: section });
  });

  section.appendChild(grid);
  container.appendChild(section);
});

// Filtering
function applyFilters() {
  var fRole = document.getElementById('f-role').value;
  var fTopic = document.getElementById('f-topic').value;
  var fPrinciple = document.getElementById('f-principle').value;
  var fKr = document.getElementById('f-kr').value;
  var visible = 0;

  allCards.forEach(function(item) {
    var c = item.card;
    var show = (!fRole || c.dataset.role === fRole) &&
               (!fTopic || c.dataset.topic === fTopic) &&
               (!fPrinciple || c.dataset.principle === fPrinciple) &&
               (!fKr || c.dataset.kr === fKr);
    c.classList.toggle('hidden', !show);
    if (show) visible++;
  });

  // Hide empty sections
  document.querySelectorAll('.kr-section').forEach(function(sec) {
    var any = sec.querySelectorAll('.req-card:not(.hidden)').length > 0;
    sec.classList.toggle('hidden', !any);
  });

  document.getElementById('result-count').textContent = visible + ' of ' + requirements.length + ' requirements';
  document.getElementById('no-results').style.display = visible === 0 ? 'block' : 'none';
}

function clearFilters() {
  ['f-role','f-topic','f-principle','f-kr'].forEach(function(id) {
    var el = document.getElementById(id);
    if (!el.disabled) el.value = '';
  });
  applyFilters();
}

['f-role','f-topic','f-principle','f-kr'].forEach(function(id) {
  document.getElementById(id).addEventListener('change', applyFilters);
});
document.getElementById('btn-clear').addEventListener('click', clearFilters);

applyFilters();
</script>
